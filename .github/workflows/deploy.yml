name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='myenv' \
            --exclude='venv' \
            --exclude='__pycache__' \
            -czf "$RUNNER_TEMP/release.tar.gz" .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_PORT }} \
            "$RUNNER_TEMP/release.tar.gz" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/release.tar.gz

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            PROJECT_PATH="${{ secrets.PROJECT_PATH }}"

            if [ -z "$PROJECT_PATH" ]; then
              echo "❌ PROJECT_PATH is empty"
              exit 1
            fi

            case "$PROJECT_PATH" in
              /opt/*) ;;
              /home/*) ;;
              /root/*) ;;
              *)
                echo "❌ PROJECT_PATH not allowed: $PROJECT_PATH"
                exit 1
                ;;
            esac

            mkdir -p "$PROJECT_PATH"
            cd "$PROJECT_PATH"

            if [ "$PWD" != "$PROJECT_PATH" ]; then
              echo "❌ Wrong deployment directory"
              exit 1
            fi

            find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'data' \
              -exec rm -rf {} +

            tar -xzf /tmp/release.tar.gz -C "$PROJECT_PATH"
            rm -f /tmp/release.tar.gz

            docker compose up -d --build --remove-orphans api

            docker compose ps

            # Health check via Docker exec (port 8000 non exposé au host)
            echo "⏳ Waiting for API to be ready..."
            for i in $(seq 1 6); do
              STATUS=$(docker compose exec api python -c \
                "import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())" \
                2>/dev/null || echo "")
              if echo "$STATUS" | grep -q '"status":"ok"'; then
                echo "✅ API is healthy: $STATUS"
                break
              fi
              echo "Attempt $i/6 failed, retrying in 5s..."
              sleep 5
            done

            docker compose exec api python -c \
              "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); print(r.read().decode())" \
              || { echo "❌ Health check failed"; exit 1; }
          EOF